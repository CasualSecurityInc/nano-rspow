name: Python wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: nano-rspow-python

jobs:
  # ---------------------------------------------------------------------------
  # Build wheels for each platform
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — native, no QEMU needed
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            qemu: false

          # Linux aarch64 — cross-compiled on x86_64; QEMU required so the
          # manylinux arm64 container can execute its own Python interpreter.
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            qemu: true

          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            qemu: false

          # macOS arm64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            qemu: false

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            qemu: false

    steps:
      - uses: actions/checkout@v4

      # Register QEMU binfmt handlers so the arm64 manylinux container can run
      # its own binaries (including Python) on the x86_64 GitHub runner.
      # This step is skipped for all native / macOS / Windows targets.
      - name: Set up QEMU
        if: matrix.qemu == true
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          working-directory: nano-rspow-python

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: nano-rspow-python/dist/*.whl

  # ---------------------------------------------------------------------------
  # Build the source distribution
  # ---------------------------------------------------------------------------
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: nano-rspow-python

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: nano-rspow-python/dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Publish to PyPI (only on tag push)
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/nano-rspow-python
    permissions:
      id-token: write  # Trusted publishing

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: nano-rspow-python/dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
          working-directory: nano-rspow-python
