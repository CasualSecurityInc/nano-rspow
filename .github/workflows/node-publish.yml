name: Publish Node.js Bindings

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build Node Bindings - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nano-rspow-node

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          # Add ports.ubuntu.com as the arm64 source (security.ubuntu.com doesn't serve arm64)
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/ports-arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/ports-arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/ports-arm64.list
          # apt-get update may emit 404 errors for arm64 from security.ubuntu.com; those are harmless
          sudo apt-get update -o APT::Update::Error-Mode=any 2>&1 | grep -v "^E:" || true
          sudo apt-get install -y gcc-aarch64-linux-gnu ocl-icd-opencl-dev:arm64
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install OpenCL (x86_64 Linux)
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev

      - name: Install OpenCL (Windows)
        if: matrix.settings.host == 'windows-latest'
        shell: pwsh
        run: |
          vcpkg install opencl --triplet x64-windows
          $root = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          echo "INCLUDE=$root\include;$env:INCLUDE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "LIB=$root\lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        working-directory: nano-rspow-node
        run: npm install

      - name: Build
        working-directory: nano-rspow-node
        run: npm run build -- --target ${{ matrix.settings.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: nano-rspow-node/*.node
          if-no-files-found: error

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: nano-rspow-node
        run: npm install

      - name: Create npm platform dirs
        working-directory: nano-rspow-node
        run: npx napi create-npm-dirs

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts into platform dirs
        working-directory: nano-rspow-node
        run: npx napi artifacts --output-dir ../artifacts --dist npm

      - name: List platform packages
        run: ls -R nano-rspow-node/npm

      - name: Publish platform packages
        working-directory: nano-rspow-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/*/; do
            echo "Publishing $dir"
            npm publish "$dir" --provenance --access public || \
              echo "Skipping $dir (already published or error)"
          done

      - name: Publish main package
        working-directory: nano-rspow-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
