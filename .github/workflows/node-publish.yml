name: Publish Node.js Bindings

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Node Bindings - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            architecture: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            architecture: aarch64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            architecture: x64
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nano-rspow-node

      - name: Install dependencies
        working-directory: nano-rspow-node
        run: npm install

      - name: Build
        working-directory: nano-rspow-node
        run: npm run build -- --target ${{ matrix.settings.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: nano-rspow-node/*.node

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write  # required for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: nano-rspow-node
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts
        run: |
          mkdir -p nano-rspow-node/artifacts
          mv artifacts/*/*.node nano-rspow-node/artifacts/ || true

      - name: Publish package
        working-directory: nano-rspow-node
        run: |
          npm version from-git --no-git-tag-version
          npm publish --provenance --access public
