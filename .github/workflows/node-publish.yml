name: Publish Node.js Bindings

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build Node Bindings - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            architecture: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            architecture: aarch64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            architecture: x64
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: nano-rspow-node

      - name: Install OpenCL (Linux)
        if: matrix.settings.host == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev

      - name: Install OpenCL (Windows)
        if: matrix.settings.host == 'windows-latest'
        shell: pwsh
        run: |
          vcpkg install opencl --triplet x64-windows
          $root = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          echo "INCLUDE=$root\include;$env:INCLUDE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "LIB=$root\lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        working-directory: nano-rspow-node
        run: npm install

      - name: Build
        working-directory: nano-rspow-node
        run: npm run build -- --target ${{ matrix.settings.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: bindings-${{ matrix.settings.target }}
          path: nano-rspow-node/*.node

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: nano-rspow-node
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Move artifacts
        run: |
          mkdir -p nano-rspow-node/artifacts
          mv artifacts/*/*.node nano-rspow-node/artifacts/ || true

      - name: Publish package
        working-directory: nano-rspow-node
        run: npm publish --provenance --access public
