name: Publish Node.js Bindings

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Node Bindings - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            architecture: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            architecture: aarch64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            architecture: x64
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nano-rspow-node

      - name: Install OpenCL (Linux)
        if: matrix.settings.host == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev

      - name: Install OpenCL (Windows)
        if: matrix.settings.host == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/GPUOpen-LibrariesAndSDKs/OCL-SDK/releases/download/1.0/OCL_SDK_Light_AMD.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\ocl_sdk.exe"
          Start-Process -Wait -FilePath "$env:TEMP\ocl_sdk.exe" -ArgumentList "/S"
          echo "C:\Program Files (x86)\OCL_SDK_Light\bin\x86_64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LIB=C:\Program Files (x86)\OCL_SDK_Light\lib\x86_64;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "INCLUDE=C:\Program Files (x86)\OCL_SDK_Light\include;$env:INCLUDE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        working-directory: nano-rspow-node
        run: npm install

      - name: Build
        working-directory: nano-rspow-node
        run: npm run build -- --target ${{ matrix.settings.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: nano-rspow-node/*.node

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write  # required for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: nano-rspow-node
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts
        run: |
          mkdir -p nano-rspow-node/artifacts
          mv artifacts/*/*.node nano-rspow-node/artifacts/ || true

      - name: Publish package
        working-directory: nano-rspow-node
        run: |
          npm version from-git --no-git-tag-version
          npm publish --provenance --access public
